<html lang="en"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro</title>
    <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
    <link href="./wwwroot/css/style.css" rel="stylesheet">
  </head>
  <body>
    <main id="main">
      <div class="container-lg d-flex flex-column">
        <div class="row align-items-center justify-content-center no-gutters">
          <div class="col-md-7 col-lg-5">
            <div class="shadow mt-5 p-5 bg-white rounded-3 border">
            <div class="w-100 text-center">
              <h1 class="display-6">Regístrate</h1>
            </div>
            
            <!-- AQUÍ ESTÁ EL CAMBIO: Agregué el FORM -->
            <form action="usuarios.php" method="POST">
              <div class="col-12">
                <div class="mb-3">
                  <label for="nombre" class="form-label">Nombre Completo</label>
                  <!-- Agregué name="nombre" -->
                  <input name="nombre" class="form-control" id="nombre" required="">
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <!-- Agregué name="email" -->
                  <input name="email" type="email" class="form-control" id="email" required="">
                </div>
                
                <div class="mb-3">
                  <label for="pwd" class="form-label">Contraseña</label>
                  <!-- Agregué name="pwd" -->
                  <input name="pwd" class="form-control" type="password" id="pwd" required="">
                </div>
                
                <div class="d-flex justify-content-between py-3">
                  <div>
                    <span class="small text-muted">¿Ya tienes cuenta?</span>
                    <a class="small" href="index.html">Iniciar sesión</a>
                    <button class="btn btn-outline-primary" onclick="registroUsuarios();"> Registrarse</button>
                  </div>
                  <!-- QUITÉ onclick y puse type="submit" -->
                 <button class="btn btn-outline-primary" onclick="login();"> Iniciar sesión</button>
                </div>
              </div>
            </form>
            
            </div>
          </div>
        </div>
      </div>
    </main>
  
</body></html>
