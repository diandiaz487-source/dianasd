<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro - Biblioteca</title>

  <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #ff4d88, #ff99bb);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    h2 {
      color: #d63384;
      text-align: center;
      margin-bottom: 20px;
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-rosa {
      background: #ff4d88;
      color: white;
      border-radius: 10px;
      width: 100%;
    }

    .btn-rosa:hover {
      background: #e6005c;
    }

    a {
      color: #ff4d88;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2><i class="bi bi-person-plus"></i> Regístrate</h2>

    <div class="mb-3">
      <label>Nombre completo</label>
      <input class="form-control">
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input class="form-control">
    </div>

    <div class="mb-3">
      <label>Contraseña</label>
      <input type="password" class="form-control">
    </div>

    <button class="btn btn-rosa mt-2">Registrarse</button>

    <div class="text-center mt-3">
      <span class="small">¿Ya tienes cuenta?</span>
      <a href="login.html">Iniciar sesión</a>
    </div>

  </div>

</body>
</html>
