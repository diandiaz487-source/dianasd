<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
    <link href="./wwwroot/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">
    <script src="./wwwroot/js/jquery-4.0.0.min.js"></script>
    <script src="./wwwroot/js/script.js"></script>
  </head>
  <body>
    <main id="main">
      <div class="container-lg d-flex flex-column">
        <div class="row align-items-center justify-content-center no-gutters">
          <div class="col-md-7 col-lg-5">
            <div class="shadow mt-5 p-5 bg-white rounded-3 border">
              <div class="w-100 text-center">
                <h1 class="display-6"> Registrate</h1>
              </div>
              <div class="col-12">

                <form method="POST" action="usuarios.php">
                  <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre completo</label>
                    <input class="form-control" type="text" id="nombre" name="nombre" required>
                  </div>
                  <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input class="form-control" type="email" id="email" name="email" required>
                  </div>
                  <div class="mb-3">
                    <label for="pwd" class="form-label">Contraseña</label>
                    <input class="form-control" type="password" id="pwd" name="pwd" required>
                  </div>
                  <div class="d-flex justify-content-between py-3">
                    <div>
                      <span class="small text-muted">¿Ya tienes cuenta?</span>
                      <a class="small" href="index.html"> Iniciar sesión</a>
                    </div>
                    <button class="btn btn-outline-primary" type="submit"> Registrarse</button>
                  </div>
                </form>

              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
